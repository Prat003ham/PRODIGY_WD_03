<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Tic Tac Toe</h1>

    <div class="mode">
        <button onclick="setMode('pvp')">2 Players</button>
        <button onclick="setMode('ai')">Play vs AI</button>
    </div>

    <div id="board" class="board"></div>

    <h2 id="status">Player X's Turn</h2>

    <button onclick="resetGame()" class="reset">Reset Game</button>
</div>

<script src="script.js"></script>
</body>
</html>
